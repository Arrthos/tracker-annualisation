name: Supabase Keep Alive

on:
  schedule:
    # S'exécute tous les lundis à 8h00 (une fois par semaine suffit généralement)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Permet de lancer le ping manuellement pour tester

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/votre_table?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
